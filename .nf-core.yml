repository_type: pipeline

nf_core_version: 3.3.2

lint:
  files_unchanged:
    - .github/CONTRIBUTING.md
    - assets/sendmail_template.txt
    - CODE_OF_CONDUCT.md
    - assets/nf-core-openmetabar_logo_light.png
    - docs/images/nf-core-openmetabar_logo_light.png
    - docs/images/nf-core-openmetabar_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/CONTRIBUTING.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
    - .prettierignore
  nextflow_config:
    - manifest.name
    - manifest.homePage
    - validation.help.beforeText
    - validation.help.afterText
    - validation.summary.beforeText
    - validation.summary.afterText
  nf_test_content: false
  multiqc_config: false
  files_exist:
    - assets/multiqc_config.yml
    - CODE_OF_CONDUCT.md
    - assets/nf-core-openmetabar_logo_light.png
    - docs/images/nf-core-openmetabar_logo_light.png
    - docs/images/nf-core-openmetabar_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - .github/workflows/nf-test.yml
    - .github/actions/get-shards/action.yml
    - .github/actions/nf-test/action.yml
    - nf-test.config
    - tests/default.nf.test
    - .github/workflows/branch.yml
    - .github/workflows/nf-test.yml
    - .github/actions/get-shards/action.yml
    - .github/actions/nf-test/action.yml
    - .github/workflows/linting_comment.yml
    - .github/workflows/linting.yml

template:
  org: nf-core
  name: OpenMetaBar
  description: This pipeline is for metabarcoding analysis (ITS, Pacbio, ONT), including
    demultiplexing to taxonomic assignment and phylogenetic analysis.
  author: Sophia Marguerit
  version: 1.0.0dev
  force: true
  outdir: .
  skip_features:
    - ci
    - nf-test
    - igenomes
    - multiqc
    - fastqc
    - gpu
    - rocrate
  is_nfcore: false
